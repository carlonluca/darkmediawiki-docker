stages:
  - build

docker-build:
  image: carlonluca/docker-multiarch:latest
  stage: build
  services:
    - docker:dind
  before_script:
    - docker login -u "$CI_DOCKER_HUB_USER" -p "$CI_DOCKER_HUB_PASSWORD" docker.io
  script:
    - export DOCKER_CLI_EXPERIMENTAL=enabled
    - docker buildx create --use --name wiki_builder
    - docker buildx build --platform linux/arm/v7,linux/arm64/v8,linux/amd64,linux/386 -t carlonluca/darkmediawiki:"$VERSION" -t carlonluca/darkmediawiki:latest .
    - docker push carlonluca/darkmediawiki:"$VERSION"
    #- docker push carlonluca/darkmediawiki:latest
    - docker buildx stop wiki_builder
    - docker buildx rm wiki_builder
  rules:
    - when: manual
